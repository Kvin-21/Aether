<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Aether - an infinite universe</title>
  <meta name="description" content="An infinite, procedurally generated universe you can explore. Warp between stars, drop onto worlds, scan them, and share your seed." />
  <meta name="theme-color" content="#05060c" />
  <meta property="og:title" content="Aether" />
  <meta property="og:description" content="An infinite, procedurally generated universe. Warp between stars, land on worlds, share your seed." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="assets/og-image.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='42%25' cy='40%25'%3E%3Cstop offset='0' stop-color='%23eaf1ff'/%3E%3Cstop offset='0.55' stop-color='%237aa2ff'/%3E%3Cstop offset='1' stop-color='%233a52a8'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='%2305060c'/%3E%3Cellipse cx='16' cy='16' rx='13' ry='4.4' fill='none' stroke='%238fb0ff' stroke-opacity='0.75' stroke-width='1.4'/%3E%3Ccircle cx='16' cy='16' r='7' fill='url(%23g)'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="intro" class="overlay">
    <div class="intro-inner">
      <h1 class="title">AETHER</h1>
      <p class="tagline">An infinite universe, grown from a single seed.</p>
      <div class="seedrow">
        <input id="seedInput" type="text" placeholder="type a seed" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <button id="randomBtn" class="icon" title="Random seed" aria-label="Random seed">&#x21bb;</button>
      </div>
      <button id="enterBtn" class="primary">Enter</button>
      <p class="hint">Drag to fly &middot; scroll or pinch to zoom &middot; click a star to dive in</p>
    </div>
  </div>

  <div id="hud" class="hud hidden">
    <div class="hud-left">
      <button id="backBtn" class="ghost back" title="Back (Esc)" aria-label="Back">&#x2039;</button>
      <div class="readout">
        <span id="hudScene" class="scene">Galaxy</span>
        <span id="hudInfo" class="muted"></span>
      </div>
    </div>
    <div class="hud-right">
      <input id="jumpInput" class="jump" type="text" placeholder="jump to seed" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button id="audioBtn" class="ghost audio muted" title="Ambient sound" aria-label="Toggle ambient sound">
        <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
          <path d="M4 9.5v5h3.6L13 18.5v-13L7.6 9.5H4z" fill="currentColor" />
          <path class="wave" d="M15.5 9a4 4 0 010 6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
          <line class="slash" x1="3.5" y1="20.5" x2="20.5" y2="3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
        </svg>
      </button>
      <button id="shareBtn" class="ghost">Share</button>
      <button id="newBtn" class="ghost">New</button>
    </div>
  </div>

  <div id="scan" class="scan hidden"></div>

  <div id="tip" class="tip hidden"></div>
  <div id="toast" class="toast hidden"></div>
  <div id="loader" class="loader hidden"><span class="ring"></span><span class="word">Generating</span></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
